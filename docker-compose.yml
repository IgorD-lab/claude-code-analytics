services:
  dashboard:
    build: .
    image: claude-code-analytics
    ports:
      - "8501:8501"
    command: >
      streamlit run src/dashboard.py
      --server.address 0.0.0.0
      --server.port 8501
      --server.headless true
    restart: unless-stopped

  api:
    image: claude-code-analytics
    ports:
      - "8000:8000"
    command: uvicorn src.api:app --host 0.0.0.0 --port 8000
    restart: unless-stopped
